    :root {
      --primary: #0d0208;
      --secondary: #1a0b2e;
      --accent: #ff00ff;
      --accent-light: #ff66ff;
      --highlight: #00ffff;
      --neon-green: #00ff00;
      --neon-orange: #ff4500;
      --text: #e0e0e0;
      --text-bright: #ffffff;
      --dark: #000000;
      --card-bg: rgba(10, 2, 20, 0.85);
      --card-border: rgba(0, 255, 255, 0.6);
      --orange: #ffaa00;
      --glow-color: rgba(255, 0, 255, 0.7);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #000000 0%, #1a0033 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 0, 255, 0.2) 0%, transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(0, 255, 255, 0.2) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(0,255,0,0.03) 0px, rgba(0,255,0,0.03) 2px, transparent 2px, transparent 6px);
      z-index: -1;
      pointer-events: none;
    }
    header {
      background: linear-gradient(to right, #000000, #120015);
      color: var(--text-bright);
      text-align: center;
      padding: 2rem;
      position: relative;
      box-shadow: 0 0 20px var(--glow-color);
      border-bottom: 4px solid transparent;
      border-image: repeating-linear-gradient(90deg, #ff00ff, #00ffff, #00ff00, #ff00ff) 30;
      animation: borderGlow 8s linear infinite;
    }
    @keyframes borderGlow {
      0% { border-image-source: repeating-linear-gradient(90deg, #ff00ff, #00ffff, #00ff00, #ff00ff); }
      50% { border-image-source: repeating-linear-gradient(90deg, #00ff00, #ff00ff, #00ffff, #00ff00); }
      100% { border-image-source: repeating-linear-gradient(90deg, #ff00ff, #00ffff, #00ff00, #ff00ff); }
    }
    header img {
      width: 150px;
      margin: 0 auto 1rem;
      display: block;
      filter: drop-shadow(0 0 15px var(--neon-green));
      transition: transform .3s ease;
    }
    header img:hover { transform: scale(1.05); }

    .language-selector {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
    }
    .language-selector select {
      padding: 0.5rem 1rem;
      background: #220033;
      color: var(--neon-green);
      border: 1px solid var(--highlight);
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
    h1 { font-size: 3.2rem; margin-bottom: 1rem; color: #fff; letter-spacing: 2px; }
    h2 {
      font-size: 1.9rem;
      margin-bottom: 1.5rem;
      color: var(--highlight);
      position: relative;
      padding-bottom: .5rem;
      text-shadow: 0 0 8px var(--highlight);
    }
    h2::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0;
      width: 100px; height: 4px;
      background: linear-gradient(to right, var(--accent), var(--neon-green));
      border-radius: 4px;
    }

    p { margin-bottom: 1rem; font-size: 1.1rem; }
    a { color: var(--highlight); text-decoration: none; transition: .2s ease; }
    a:hover { color: var(--neon-green); text-decoration: underline; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-top: 2rem; }
    .card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 2rem;
      border: 1px solid var(--card-border);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(255, 0, 255, 0.1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    .card:hover { transform: translateY(-4px); }
    .card::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 70%);
      transform: rotate(30deg);
      z-index: 0;
    }
    .card-content { position: relative; z-index: 1; }

    .card.moonworld-card { grid-column: span 2; }
    .card.moonworld-card h2 { font-size: 2.4rem; }
    .countdown { font-size: 2.3rem; margin: 1.3rem 0; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

    .card.supply-card { padding: 1.5rem; }
    .card.supply-card h2 { font-size: 1.5rem; }
    .card.supply-card canvas { max-height: 250px; width: 100% !important; }

    .btn {
      background: linear-gradient(45deg, var(--accent), var(--highlight));
      color: #000;
      padding: .8rem 1.8rem;
      border: 1px solid var(--neon-green);
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      display: inline-block;
      margin-top: 1rem;
      cursor: pointer;
      box-shadow: 0 0 12px var(--glow-color);
    }
    .btn:hover { box-shadow: 0 0 25px var(--neon-green); text-decoration: none; }
    .btn.secondary { background: linear-gradient(45deg, #333, #111); color: var(--highlight); border: 1px solid var(--highlight); }
    .btn.small { padding: .4rem 1rem; font-size: .85rem; border-radius: 30px; }
    .btn.large { padding: 1rem 2.5rem; font-size: 1.2rem; }

    .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: .8rem; align-items: center; }

    .img-container {
      text-align: center;
      margin: 1.2rem auto;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      max-width: 760px;
    }
    .img-container img {
      width: 100%;
      max-width: 720px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    ul { padding-left: 1.5rem; margin: 1rem 0; }
    li { margin-bottom: .8rem; list-style: none; position: relative; }

      content: "â–º";

      border-radius: .4rem;
      border: 1px solid var(--highlight);
      color: var(--neon-green);

      border-radius: 10px;

    .stat-card {

      padding: 1.5rem;
      text-align: center;

    .stat-label {

      .stat-value { font-size: 1.7rem; }
      .img-container { max-width: 92%; }
      .img-container img { max-width: 100%; }
    }
  </style>

      const labels = [dict.legendOwner, dict.legendStaking, dict.legendGames];
      const data = [OWNER_RESERVE, STAKING_POOL, GAME_POOL];
      const total = data.reduce((a,b)=>a+b,0);

      if (supplyChart) supplyChart.destroy();
      supplyChart = new Chart(ctx, {
        type: 'pie',
        data: { labels, datasets: [{ data, backgroundColor: [c1, c2, c3], borderColor: 'rgba(255,255,255,0.15)', borderWidth: 1 }] },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#fff' } },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const val = ctx.parsed;
                  const pct = (val * 100 / total).toFixed(3);
                  return `${ctx.label}: ${pct}% (${fmt(val)} B20)`;
                }
              }
            }
          }
        }
      });

      document.getElementById('ownerOut').textContent = fmt(OWNER_RESERVE);
      document.getElementById('stakingOut').textContent = fmt(STAKING_POOL);
      document.getElementById('gamesOut').textContent = fmt(GAME_POOL);
    }

    async function fetchHoldersCount() {
      document.getElementById('holdersCount').textContent = '1,881';
    }

    async function fetchTxCount() {
      document.getElementById('txCount').textContent = '145.3k';
    }

    async function fetchB20Price() {
      try {
        const b20Price = 0.0032;
        document.getElementById('b20Price').textContent = `$${b20Price.toFixed(4)}`;
        updatePriceChart(b20Price);
      } catch (error) {
        document.getElementById('b20Price').textContent = '$0.0032';
      }
    }

    function initLivePriceChart() {
      const ctx = document.getElementById('livePriceChart').getContext('2d');
      if (livePriceChart) livePriceChart.destroy();
      livePriceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Precio B20 (USD)',
            data: [],
            borderColor: '#00ff00',
            backgroundColor: 'rgba(0, 255, 0, 0.1)',
            borderWidth: 2,
            pointBackgroundColor: '#ff00ff',
            pointBorderColor: '#ffffff',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: false, grid: { color: 'rgba(0,255,255,0.1)' }, ticks: { color: '#00ffff' } },
            x: { ticks: { color: '#00ffff' } }
          },
          plugins: { legend: { labels: { color: '#fff' } } }
        }
      });

      priceChartData = [];
      for (let i = 0; i < 20; i++) {
        priceChartData.push(0.0032 + (Math.random() * 0.0005 - 0.00025));
      }
      updatePriceChart();
    }

    function updatePriceChart(newPrice) {
      if (!livePriceChart) return;
      if (newPrice) {
        priceChartData.push(newPrice);
        if (priceChartData.length > 20) priceChartData.shift();
      }

      const now = new Date();
      const labels = [];
      for (let i = 0; i < priceChartData.length; i++) {
        const t = new Date(now.getTime() - (priceChartData.length - 1 - i) * 10000);
        labels.push(t.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
      }

      livePriceChart.data.labels = labels;
      livePriceChart.data.datasets[0].data = priceChartData;
      livePriceChart.update();
    }

    function initMoonworldCountdown() {
      const countdownEl = document.getElementById('moonworldCountdown');
      if (!countdownEl) return;

      // Fecha fija global. Cambia aquÃ­ cuando quieras.
      const launchDateUTC = '2026-10-31T18:00:00Z';
      const targetDate = new Date(launchDateUTC);

      function updateCountdown() {
        const now = new Date();
        const diff = targetDate.getTime() - now.getTime();

        if (diff <= 0) {
          countdownEl.textContent = "Â¡YA DISPONIBLE!";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownEl.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    function fetchLiveStats() {
      fetchHoldersCount();
      fetchTxCount();
      fetchB20Price();
    }

    function applyLang(lang) {
      const dict = T[lang] || T.es;
      document.documentElement.setAttribute('lang', lang);
      document.getElementById('langSwitcher').value = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key] !== undefined) el.innerHTML = dict[key];
      });

      localStorage.setItem('b20_lang', lang);
      renderSupplyChart(dict);
    }

    function initActions() {
      const addrEl = document.getElementById('contractAddr');

      document.getElementById('copyContract')?.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(addrEl.textContent.trim());
          alert('Contrato copiado âœ”');
        } catch {
          alert('No se pudo copiar.');
        }
      });

      document.getElementById('addToMM')?.addEventListener('click', async () => {
        const tokenAddress = addrEl.textContent.trim();
        try {
          if (!window.ethereum) {
            alert('MetaMask no detectado.');
            return;
          }
          await window.ethereum.request({
            method: 'wallet_watchAsset',
            params: {
              type: 'ERC20',
              options: {
                address: tokenAddress,
                symbol: 'B20',
                decimals: 18,
                image: location.origin + '/logo.png'
              }
            }
          });
        } catch {
          alert('No se pudo aÃ±adir a MetaMask.');
        }
      });

      document.getElementById('downloadChart')?.addEventListener('click', () => {
        const canvas = document.getElementById('supplyChart');
        const link = document.createElement('a');
        link.download = 'B20-supply.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    (function init() {
      initActions();
      fetchLiveStats();
      initLivePriceChart();
      initMoonworldCountdown();

      const saved = localStorage.getItem('b20_lang');
      const nav = (navigator.language || 'es').slice(0,2);
      const initial = saved || (['es','en','fr','ru'].includes(nav) ? nav : 'es');
      applyLang(initial);

      document.getElementById('langSwitcher').addEventListener('change', e => applyLang(e.target.value));

      setInterval(fetchLiveStats, 30000);

      setInterval(() => {
        if (priceChartData.length > 0) {
          const last = priceChartData[priceChartData.length - 1];
          const variation = (Math.random() * 0.0002 - 0.0001);
          const newPrice = Math.max(0.003, last + variation);
          updatePriceChart(newPrice);
          document.getElementById('b20Price').textContent = `$${newPrice.toFixed(4)}`;
        }
      }, 10000);
    })();
  </script>
</body>
</html>
